<div class="tasks-tool">
    <button id="tasksToolButton" class="tasks-tool-button" type="button" aria-haspopup="menu" aria-expanded="false">
        <span class="tasks-tool-button-icon" aria-hidden="true">
            <img class="tasks-tool-button-icon-image" alt="">
        </span>
        <span class="tasks-tool-button-label">Tasks</span>
        <span class="tasks-tool-button-chevron" aria-hidden="true">▾</span>
    </button>
    <div id="tasksToolMenu" class="tasks-tool-menu" role="menu" hidden>
        <button id="tasksToolNewBacklog" class="tasks-tool-menu-item" type="button" role="menuitem">
            New backlog
        </button>
        <button id="tasksToolShowAll" class="tasks-tool-menu-item" type="button" role="menuitem">
            Show all
        </button>
    </div>
</div>
