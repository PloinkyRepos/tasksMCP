<div class="backlog-create-file-modal">
    <div class="modal-header">
        <div class="modal-title">Create backlog file</div>
        <div class="close" data-local-action="closeModal">
            <img class="close-icon" src="./assets/icons/x-mark.svg" alt="close">
        </div>
    </div>
    <div class="modal-body">
        <div class="form-item">
            <label class="form-label" for="backlogFileNameInput">File name</label>
            <input id="backlogFileNameInput" class="form-input" type="text" spellcheck="false" placeholder="team.backlog" />
        </div>
        <div class="backlog-create-file-hint">The file will be created in the repo root.</div>
    </div>
    <div class="modal-actions">
        <button type="button" class="general-button secondary" data-local-action="closeModal">Cancel</button>
        <button type="button" class="general-button" data-local-action="createFile">Create</button>
    </div>
</div>
