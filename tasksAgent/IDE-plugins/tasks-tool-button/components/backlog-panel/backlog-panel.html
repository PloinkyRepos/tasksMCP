<div class="backlog-panel">
    <div class="backlog-header" id="backlogHeader">
        <div class="backlog-file" id="backlogFileLabel"></div>
        <div class="backlog-actions">
            <button type="button" class="secondary backlog-refresh" data-local-action="refreshBacklog"
                    aria-label="Refresh">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                     viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                    <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
                    <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
                </svg>
            </button>
            <button type="button" class="secondary" data-local-action="exportHistory" id="backlogExportHistory">Export
                history
            </button>
            <button type="button" class="secondary" data-local-action="toggleListView" id="backlogListToggle">List
                view
            </button>
            <button type="button" class="primary" data-local-action="openCreateTaskModal">New task</button>
        </div>
    </div>

    <div class="backlog-error" id="backlogError" aria-live="polite"></div>
    <div class="backlog-conflict" id="backlogConflict" aria-live="polite">
        .backlog has merge conflicts. Resolve them before editing tasks.
    </div>

    <div class="backlog-filters" id="backlogFilters">
        <label>
            Status
            <select id="backlogStatusFilter"></select>
        </label>
        <label>
            Search
            <input id="backlogSearchFilter" type="search" autocomplete="off" spellcheck="false"/>
        </label>
        <div class="backlog-filter-actions">
            <button type="button" class="secondary" data-local-action="clearFilters">Clear</button>
        </div>
    </div>

    <div><span class="backlog-section-title" id="backlogSectionTitle">Tasks</span>
        <span class="backlog-list-hint"
              id="backlogListHint">Tip: drag and drop tasks to reorder.</span></div>

    <div class="backlog-list" id="backlogList"></div>
    <div class="backlog-list-view" id="backlogListView" aria-label="Backlog list view"></div>

    <div class="backlog-empty" id="backlogEmpty">No tasks found.</div>
    <div class="backlog-carousel" id="backlogCarousel">
        <button type="button" class="secondary" data-local-action="prevTask">Prev</button>
        <div class="backlog-carousel-info" id="backlogCarouselInfo">0 / 0</div>
        <button type="button" class="secondary" data-local-action="nextTask">Next</button>
    </div>

</div>
